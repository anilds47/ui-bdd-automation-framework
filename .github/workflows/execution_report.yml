name: Run Tests & Send HTML Summary

on:
  push:
    branches: [ testing_github_action ]
  workflow_dispatch:

jobs:
  test_and_mail:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Maven Tests
        run: mvn clean test

      - name: Upload Extent Report as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ExtentReport
          path: target/extent.html  # or folder if multiple reports
